<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bay Hive</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <!-- suppress favicon 404 -->
  <link rel="icon" href="data:,">

  <!--
    ES modules are blocked on file:// — must be served over HTTP.
    Start the included server:  node serve.js
    Then open:                  http://localhost:3000
  -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header id="header">
  <div id="header-text">
    <h1>🐝 Bay Hive</h1>
    <p>Public Data Intelligence for Pollinator Operations in the Green Bay area.</p>
  </div>
  <div id="status" aria-live="polite">Loading…</div>
</header>

<div id="map">

  <div id="loading" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <span>Fetching observations…</span>
  </div>

  <div id="panel" role="complementary" aria-label="Map controls">

    <section class="panel-section" id="panel-sightings">
      <details open>
        <summary class="panel-title panel-collapsible">&#x1F52D; Sightings</summary>

        <div id="panel-dates-inner">
          <div class="date-row">
            <div class="date-group">
              <label class="date-label" for="date-from">From</label>
              <input type="date" id="date-from" class="date-input">
            </div>
            <div class="date-group">
              <label class="date-label" for="date-to">To</label>
              <input type="date" id="date-to" class="date-input">
            </div>
          </div>
          <button id="btn-reload" class="reload-btn">&#x21BA; Load Observations</button>
        </div>

        <div id="panel-layers">
          <!-- populated by ui.js -->
        </div>
      </details>
    </section>

    <section class="panel-section" id="panel-areas">
      <h2 class="panel-title">Protected Areas, Waystations &amp; Hazards</h2>
      <!-- populated by ui.js -->
    </section>

    <section class="panel-section" id="panel-area-legend">
      <h2 class="panel-title">Map Layer Legend</h2>
      <!-- populated by ui.js -->
    </section>

    <section class="panel-section" id="panel-est">
      <h2 class="panel-title">Establishment &middot; ring color</h2>
      <!-- populated by ui.js -->
    </section>

  </div>
</div>

<!-- MapLibre must load before the module so maplibregl is on window -->
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
